backend:
  name: git-gateway
  branch: main

local_backend: true

publish_mode: editorial_workflow

media_folder: "src/assets/images/content"
public_folder: "/src/assets/images/content"

collections:
  # ─────────────────────────────────────────────
  # Site Settings (singleton files)
  # ─────────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    description: "Customize the site's visual identity — fonts, colors, and layout. Changes take effect after the next site build."
    files:
      # ── Typography & Fonts ──
      - name: "typography"
        label: "Typography & Fonts"
        file: "src/content/settings/typography.json"
        fields:
          - label: "Display Font (Headings)"
            name: "displayFont"
            widget: "select"
            options:
              - { label: "Fraunces — Warm old-style serif with optical sizing (default)", value: "Fraunces" }
              - { label: "Playfair Display — High-contrast transitional serif, elegant and editorial", value: "Playfair Display" }
              - { label: "Merriweather — Sturdy screen-optimized serif, excellent readability", value: "Merriweather" }
              - { label: "Lora — Calligraphic contemporary serif, balanced and friendly", value: "Lora" }
              - { label: "Libre Baskerville — Classic Baskerville revival, refined and traditional", value: "Libre Baskerville" }
              - { label: "Cormorant Garamond — Light, graceful Garamond-inspired display face", value: "Cormorant Garamond" }
              - { label: "EB Garamond — Claude Garamond revival, timeless book typography", value: "EB Garamond" }
              - { label: "Crimson Text — Inspired by old-style typefaces, warm and readable", value: "Crimson Text" }
              - { label: "Spectral — Google-commissioned serif designed for screen reading", value: "Spectral" }
              - { label: "DM Serif Display — Compact display serif with low contrast, modern feel", value: "DM Serif Display" }
              - { label: "Bitter — Slab serif designed for comfortable screen reading", value: "Bitter" }
              - { label: "Noto Serif — Google's universal serif, supports 1000+ languages", value: "Noto Serif" }
              - { label: "Vollkorn — Organic, sturdy serif with generous curves", value: "Vollkorn" }
              - { label: "Alegreya — Dynamic serif with rhythm, ideal for long-form reading", value: "Alegreya" }
              - { label: "Cardo — Large Unicode serif, scholarly and refined", value: "Cardo" }
              - { label: "Gentium Plus — Elegant serif designed for multilingual text", value: "Gentium Plus" }
              - { label: "PT Serif — ParaType's professional serif, balanced proportions", value: "PT Serif" }
              - { label: "Zilla Slab — Mozilla's slab serif, bold and contemporary", value: "Zilla Slab" }
              - { label: "Josefin Slab — Geometric slab serif with vintage elegance", value: "Josefin Slab" }
              - { label: "Rokkitt — Friendly slab serif with a sturdy, approachable feel", value: "Rokkitt" }
              - { label: "Crimson Pro — Modern update of Crimson Text with variable weight support", value: "Crimson Pro" }
              - { label: "Newsreader — Designed for on-screen news reading, optical sizing", value: "Newsreader" }
              - { label: "Literata — Google Books serif, updated with optical sizing", value: "Literata" }
              - { label: "Gelasio — Georgia-compatible serif with a warm, professional feel", value: "Gelasio" }
              - { label: "Domine — Sturdy serif optimized for body text on screens", value: "Domine" }
              - { label: "Tinos — Times New Roman metric-compatible serif", value: "Tinos" }
              - { label: "Noto Serif Display — Google's display-optimized serif for large headings", value: "Noto Serif Display" }
              - { label: "Brygada 1918 — Polish heritage serif, elegant and dignified", value: "Brygada 1918" }
              - { label: "Piazzolla — Argentine tango-inspired serif with optical sizing", value: "Piazzolla" }
              - { label: "Yrsa — Compact serif designed for Indian and Latin scripts", value: "Yrsa" }
              - { label: "Martel — Heavy-weight serif with Devanagari support", value: "Martel" }
              - { label: "Lusitana — Portuguese-influenced classical serif", value: "Lusitana" }
              - { label: "Noticia Text — Slab-influenced serif designed for digital news", value: "Noticia Text" }
              - { label: "Old Standard TT — Late 19th century Didone revival, scholarly", value: "Old Standard TT" }
              - { label: "Sorts Mill Goudy — Frederic Goudy revival, Arts & Crafts era elegance", value: "Sorts Mill Goudy" }
              - { label: "Cinzel — Classically proportioned Roman capitals, monumental", value: "Cinzel" }
              - { label: "Abril Fatface — Ultra-bold didone display face, dramatic impact", value: "Abril Fatface" }
              - { label: "Bodoni Moda — Giambattista Bodoni revival with optical sizing", value: "Bodoni Moda" }
              - { label: "Cormorant — Elegant display serif inspired by Garamond, lighter weight", value: "Cormorant" }
              - { label: "Petrona — Warm editorial serif with personality", value: "Petrona" }
              - { label: "Libre Caslon Text — William Caslon revival, classic English typography", value: "Libre Caslon Text" }
              - { label: "DM Serif Text — Companion to DM Serif Display for body text", value: "DM Serif Text" }
              - { label: "Arvo — Geometric slab serif, sturdy and confident", value: "Arvo" }
              - { label: "Neuton — Elegant serif with a modern Dutch feel", value: "Neuton" }
              - { label: "Mate — Warm text serif with a South American personality", value: "Mate" }
              - { label: "Arapey — Delicate didone serif with Uruguayan flair", value: "Arapey" }
              - { label: "Prata — High-contrast didone display serif, refined", value: "Prata" }
              - { label: "Yeseva One — Decorative headline serif with Slavic warmth", value: "Yeseva One" }
              - { label: "Cormorant Infant — Softer, rounded version of Cormorant", value: "Cormorant Infant" }
              - { label: "Quando — Friendly, rounded serif with a vintage feel", value: "Quando" }
              - { label: "Tenor Sans — Elegant display sans with serif sensibility", value: "Tenor Sans" }
              - { label: "Philosopher — Humanist serif with a classical, literary tone", value: "Philosopher" }
              - { label: "Vidaloka — High-contrast display serif, elegant and sharp", value: "Vidaloka" }
              - { label: "Oranienbaum — Classic Russian-influenced serif with refined elegance", value: "Oranienbaum" }
              - { label: "Cambo — Sturdy slab serif with clear, confident letterforms", value: "Cambo" }
              - { label: "Italiana — Tall, elegant italic-style display serif", value: "Italiana" }
              - { label: "Buenard — Warm text serif with South American design roots", value: "Buenard" }
              - { label: "Unna — Elegant transitional serif with a journalistic feel", value: "Unna" }
              - { label: "Headland One — Display serif with optical-size optimized for headlines", value: "Headland One" }
              - { label: "Fanwood Text — Inspired by Frederic Goudy, warm and literary", value: "Fanwood Text" }
              - { label: "Rufina — High-contrast serif inspired by Latin American typography", value: "Rufina" }
              - { label: "GFS Didot — Greek-influenced didone with exceptional elegance", value: "GFS Didot" }
              - { label: "Vesper Libre — Devanagari-influenced serif, structured and scholarly", value: "Vesper Libre" }
              - { label: "Coustard — Bold slab serif with a warm, editorial personality", value: "Coustard" }
              - { label: "Proza Libre — Humanist serif designed for long-form reading", value: "Proza Libre" }
              - { label: "Alike — Friendly display serif with rounded serifs", value: "Alike" }
            default: "Fraunces"
            hint: "The serif font used for all headings across the site — page titles like 'Education', section headings like 'Explore by Topic', and the hero title 'Liberty Lighthouse'. Default: Fraunces"

          - label: "Body Font"
            name: "bodyFont"
            widget: "select"
            options:
              - { label: "Source Sans 3 — Adobe's open-source sans-serif, neutral and clean (default)", value: "Source Sans 3" }
              - { label: "Inter — Designed for screens, tall x-height, excellent legibility", value: "Inter" }
              - { label: "Open Sans — Friendly humanist sans-serif, widely used for web content", value: "Open Sans" }
              - { label: "Roboto — Google's signature typeface, geometric with open curves", value: "Roboto" }
              - { label: "Lato — Warm, stable, semi-rounded sans-serif", value: "Lato" }
              - { label: "Nunito — Rounded sans-serif, approachable and modern", value: "Nunito" }
              - { label: "Work Sans — Grotesque sans optimized for screen use at medium sizes", value: "Work Sans" }
              - { label: "DM Sans — Low-contrast geometric sans-serif, clean and minimal", value: "DM Sans" }
              - { label: "Poppins — Geometric sans with circular letterforms, contemporary feel", value: "Poppins" }
              - { label: "Raleway — Elegant thin-weight sans-serif, works well at large sizes", value: "Raleway" }
              - { label: "Outfit — Modern geometric sans with a friendly personality", value: "Outfit" }
              - { label: "Plus Jakarta Sans — Fresh geometric sans with distinctive character", value: "Plus Jakarta Sans" }
              - { label: "Noto Sans — Google's universal sans-serif, supports 1000+ languages", value: "Noto Sans" }
              - { label: "Mukta — Open-source sans-serif with Devanagari support", value: "Mukta" }
              - { label: "Rubik — Rounded corners, slightly playful geometric sans", value: "Rubik" }
              - { label: "Cabin — Humanist sans with a warm, modern personality", value: "Cabin" }
              - { label: "Karla — Grotesque sans-serif with quirky charm", value: "Karla" }
              - { label: "Lexend — Designed to improve reading proficiency", value: "Lexend" }
              - { label: "Figtree — Friendly geometric sans with open apertures", value: "Figtree" }
              - { label: "Manrope — Semi-rounded geometric sans, modern and clean", value: "Manrope" }
              - { label: "Montserrat — Geometric sans inspired by Buenos Aires signage", value: "Montserrat" }
              - { label: "Barlow — Slightly condensed grotesk, inspired by California plates", value: "Barlow" }
              - { label: "Josefin Sans — Elegant geometric sans with vintage Scandinavian flair", value: "Josefin Sans" }
              - { label: "Quicksand — Rounded geometric sans, light and airy", value: "Quicksand" }
              - { label: "Mulish — Clean geometric sans, formerly known as Muli", value: "Mulish" }
              - { label: "Overpass — Open-source sans inspired by Highway Gothic", value: "Overpass" }
              - { label: "Urbanist — Low-contrast geometric sans with modern minimalism", value: "Urbanist" }
              - { label: "Red Hat Display — Red Hat's brand display typeface, bold and open", value: "Red Hat Display" }
              - { label: "Albert Sans — Modern geometric sans with a friendly, open feel", value: "Albert Sans" }
              - { label: "Sora — Japanese-influenced geometric sans, precise and minimal", value: "Sora" }
              - { label: "Commissioner — Variable sans with Cyrillic optimization", value: "Commissioner" }
              - { label: "Atkinson Hyperlegible — Braille Institute font optimized for low-vision readers", value: "Atkinson Hyperlegible" }
              - { label: "Public Sans — US government open-source neutral sans-serif", value: "Public Sans" }
              - { label: "Nunito Sans — Sans-serif companion to Nunito, cleaner curves", value: "Nunito Sans" }
              - { label: "Exo 2 — Futuristic geometric sans with technological personality", value: "Exo 2" }
              - { label: "Libre Franklin — Franklin Gothic revival, sturdy and versatile", value: "Libre Franklin" }
              - { label: "IBM Plex Sans — IBM's corporate sans-serif, neutral and precise", value: "IBM Plex Sans" }
              - { label: "PT Sans — ParaType's professional sans, clean proportions", value: "PT Sans" }
              - { label: "Titillium Web — Born from the Accademia di Belle Arti di Urbino project", value: "Titillium Web" }
              - { label: "Hind — Devanagari + Latin sans-serif, optimized for Indian languages", value: "Hind" }
              - { label: "Signika — Warm semi-rounded sans for signage and wayfinding", value: "Signika" }
              - { label: "Heebo — Hebrew + Latin sans-serif, clean and modern", value: "Heebo" }
              - { label: "Asap — Slightly rounded contemporary sans, balanced and readable", value: "Asap" }
              - { label: "Red Hat Text — Red Hat's brand text typeface for body copy", value: "Red Hat Text" }
              - { label: "Bricolage Grotesque — Expressive variable grotesque with optical sizing", value: "Bricolage Grotesque" }
              - { label: "Instrument Sans — Minimal geometric sans with technical precision", value: "Instrument Sans" }
              - { label: "Wix Madefor Display — Wix's brand typeface, optimized for digital", value: "Wix Madefor Display" }
              - { label: "Geist — Vercel's modern sans-serif, designed for developers", value: "Geist" }
            default: "Source Sans 3"
            hint: "The sans-serif font used for all body text — FAQ answers, video descriptions, navigation links, breadcrumbs, and buttons. Default: Source Sans 3"

          - label: "Monospace Font"
            name: "monoFont"
            widget: "select"
            options:
              - { label: "JetBrains Mono — Developer-focused mono with ligatures (default)", value: "JetBrains Mono" }
              - { label: "Fira Code — Programming ligatures, designed by Mozilla", value: "Fira Code" }
              - { label: "Source Code Pro — Adobe's monospace companion to Source Sans", value: "Source Code Pro" }
              - { label: "IBM Plex Mono — IBM's corporate monospace, neutral and precise", value: "IBM Plex Mono" }
              - { label: "Roboto Mono — Google's monospace companion to Roboto", value: "Roboto Mono" }
              - { label: "Space Mono — Fixed-width typeface with a retro, editorial feel", value: "Space Mono" }
              - { label: "Inconsolata — Classic programming font, clean and condensed", value: "Inconsolata" }
              - { label: "Ubuntu Mono — Ubuntu's monospace, friendly and distinctive", value: "Ubuntu Mono" }
              - { label: "Overpass Mono — Open-source mono inspired by Highway Gothic", value: "Overpass Mono" }
              - { label: "DM Mono — Low-contrast monospace, clean and geometric", value: "DM Mono" }
              - { label: "Anonymous Pro — Designed for coders, distinguishes similar characters", value: "Anonymous Pro" }
              - { label: "Courier Prime — Enhanced Courier for screenwriting and prose", value: "Courier Prime" }
              - { label: "Noto Sans Mono — Google's universal monospace, 1000+ language support", value: "Noto Sans Mono" }
              - { label: "Red Hat Mono — Red Hat's brand monospace, bold and technical", value: "Red Hat Mono" }
              - { label: "Martian Mono — Wide monospace with a sci-fi personality", value: "Martian Mono" }
              - { label: "Geist Mono — Vercel's modern monospace for developer tools", value: "Geist Mono" }
            default: "JetBrains Mono"
            hint: "The monospace font used for code blocks and technical content. Default: JetBrains Mono"

          - label: "Base Font Size (%)"
            name: "baseFontSize"
            widget: "number"
            value_type: "float"
            min: 75
            max: 150
            step: 6.25
            default: 106.25
            hint: "Controls the root font size that all other sizes scale from. 100% = 16px, 106.25% = 17px (default), 112.5% = 18px. Affects all body text, buttons, navigation, and metadata across every page."

          - label: "Base Line Height"
            name: "baseLineHeight"
            widget: "number"
            value_type: "float"
            min: 1.0
            max: 2.5
            step: 0.1
            default: 1.7
            hint: "Line spacing multiplier for body text — controls vertical rhythm in FAQ answers, video descriptions, and all paragraph content. Lower = tighter lines, higher = more breathing room. Default: 1.7"

          - label: "Hero Title Size (rem)"
            name: "heroTitleSize"
            widget: "number"
            value_type: "float"
            min: 2.0
            max: 6.0
            step: 0.25
            default: 3.5
            hint: "Font size for the main 'Liberty Lighthouse' hero title on the homepage. This is independent of other heading sizes. Uses responsive clamping (min 2rem, max this value). Default: 3.5rem"

          - label: "H1 Size (rem)"
            name: "h1Size"
            widget: "number"
            value_type: "float"
            min: 1.0
            max: 5.0
            step: 0.125
            default: 2.0
            hint: "Font size for main page headings — e.g., 'Education', 'Search', 'Topics', 'Page Not Found'. Measured in rem (relative to base font size). Default: 2rem"

          - label: "H2 Size (rem)"
            name: "h2Size"
            widget: "number"
            value_type: "float"
            min: 0.75
            max: 4.0
            step: 0.125
            default: 1.5
            hint: "Font size for section headings within pages — e.g., 'Explore by Topic', 'About Liberty Lighthouse', 'Frequently Asked Questions' cards. Default: 1.5rem"

          - label: "H3 Size (rem)"
            name: "h3Size"
            widget: "number"
            value_type: "float"
            min: 0.75
            max: 3.0
            step: 0.125
            default: 1.125
            hint: "Font size for smaller headings — e.g., individual video titles in the grid, FAQ question titles, sidebar headings, and card subheadings. Default: 1.125rem"

      # ── Colors & Theme ──
      - name: "colors"
        label: "Colors & Theme"
        file: "src/content/settings/colors.json"
        fields:
          # ── Core Identity ──
          - label: "Primary Color"
            name: "colorPrimary"
            widget: "color"
            default: "#6B3A1F"
            hint: "The main brand color — used for the navigation bar accent, focus rings, link hover states, primary buttons, and the browser theme color. Default: #6B3A1F (warm brown)"

          - label: "Primary Light"
            name: "colorPrimaryLight"
            widget: "color"
            default: "#8B5E3C"
            hint: "A lighter shade of the primary color — used for button hover states and subtle emphasis. Default: #8B5E3C"

          - label: "Accent Color"
            name: "colorAccent"
            widget: "color"
            default: "#C4703C"
            hint: "Used for decorative elements — the hero ornamental rule, highlighted interactive elements, and selection backgrounds. Default: #C4703C (warm orange-brown)"

          - label: "Accent Text Color"
            name: "colorAccentText"
            widget: "color"
            default: "#A96032"
            hint: "The color used for hyperlinks and interactive text throughout all pages. Default: #A96032"

          - label: "Accent Soft"
            name: "colorAccentSoft"
            widget: "color"
            default: "#D4924F"
            hint: "A softer accent used for text selection highlight backgrounds. Default: #D4924F"

          # ── Text Hierarchy ──
          - label: "Text Primary"
            name: "colorTextPrimary"
            widget: "color"
            default: "#1A1612"
            hint: "Color of all main body text, headings, FAQ answers, and important content. Default: #1A1612 (near-black brown)"

          - label: "Text Secondary"
            name: "colorTextSecondary"
            widget: "color"
            default: "#5C524A"
            hint: "Used for supporting text — topic descriptions, video summaries, breadcrumbs, and secondary labels. Default: #5C524A"

          - label: "Text Tertiary"
            name: "colorTextTertiary"
            widget: "color"
            default: "#7D726A"
            hint: "Used for metadata — video duration, speaker names, timestamps, and low-emphasis labels. Default: #7D726A"

          - label: "Text Muted"
            name: "colorTextMuted"
            widget: "color"
            default: "#A89E96"
            hint: "Lowest emphasis text — placeholder text in search input, disabled states, and decorative text. Default: #A89E96"

          - label: "Text On Dark"
            name: "colorTextOnDark"
            widget: "color"
            default: "#FAF7F4"
            hint: "Text color used on dark backgrounds — the hero section title, footer text, and buttons on dark surfaces. Default: #FAF7F4 (warm off-white)"

          # ── Surfaces & Backgrounds ──
          - label: "Page Background"
            name: "colorBgPage"
            widget: "color"
            default: "#FDFBF9"
            hint: "The main page background color visible behind all content on every page. Default: #FDFBF9 (warm cream)"

          - label: "Section Background"
            name: "colorBgSection"
            widget: "color"
            default: "#F7F3EF"
            hint: "Used for alternating content sections — the 'About' area, FAQ answer backgrounds, and search result cards. Default: #F7F3EF (light warm gray)"

          - label: "Card Background"
            name: "colorBgCard"
            widget: "color"
            default: "#FFFFFF"
            hint: "Background color for cards — topic cards, video cards, FAQ cards, and content containers. Default: #FFFFFF (white)"

          - label: "Elevated Background"
            name: "colorBgElevated"
            widget: "color"
            default: "#FFF9F4"
            hint: "Used for elevated or highlighted surfaces — tooltips, dropdown menus, and hover states on cards. Default: #FFF9F4"

          - label: "Dark Background"
            name: "colorBgDark"
            widget: "color"
            default: "#1A1612"
            hint: "Used for the hero section, footer, code blocks, and dark-themed areas. Default: #1A1612 (dark charcoal)"

          - label: "Dark Background Soft"
            name: "colorBgDarkSoft"
            widget: "color"
            default: "#2C2520"
            hint: "A slightly lighter dark background — used for footer link hover states and subtle contrast within dark sections. Default: #2C2520"

          # ── Borders & Dividers ──
          - label: "Border Default"
            name: "colorBorderDefault"
            widget: "color"
            default: "#E8E2DC"
            hint: "Color of card borders, table lines, dividers, and horizontal rules throughout the site. Default: #E8E2DC"

          - label: "Border Strong"
            name: "colorBorderStrong"
            widget: "color"
            default: "#D4CCC4"
            hint: "A more prominent border color — used for table header borders, active input borders, and emphasized dividers. Default: #D4CCC4"

          - label: "Border Subtle"
            name: "colorBorderSubtle"
            widget: "color"
            default: "#F0EBE6"
            hint: "A very light border — used for section separators, breadcrumb dividers, and subtle card outlines. Default: #F0EBE6"

          - label: "Border Focus"
            name: "colorBorderFocus"
            widget: "color"
            default: "#6B3A1F"
            hint: "The focus ring color shown when keyboard-navigating — appears around buttons, links, and form inputs when focused. Default: #6B3A1F"

          # ── Functional Colors ──
          - label: "Success Color"
            name: "colorSuccess"
            widget: "color"
            default: "#5C7A52"
            hint: "Used for success states — form submission confirmations, positive status badges, and success messages. Default: #5C7A52 (muted green)"

          - label: "Warning Color"
            name: "colorWarning"
            widget: "color"
            default: "#B8863A"
            hint: "Used for warning states — caution messages, draft badges, and attention-needed indicators. Default: #B8863A (amber)"

          - label: "Error Color"
            name: "colorError"
            widget: "color"
            default: "#A04030"
            hint: "Used for error states — form validation errors, error messages, and destructive action indicators. Default: #A04030 (muted red)"

          # ── Border Radius ──
          - label: "Border Radius Small (px)"
            name: "radiusSm"
            widget: "number"
            value_type: "int"
            min: 0
            max: 20
            step: 1
            default: 4
            hint: "Rounding for small elements — badges, inline code, focus outlines, skip-link, and small buttons. Default: 4px"

          - label: "Border Radius Medium (px)"
            name: "radiusMd"
            widget: "number"
            value_type: "int"
            min: 0
            max: 32
            step: 1
            default: 8
            hint: "Rounding for medium elements — content cards, search input, code blocks, and images in articles. Default: 8px"

          - label: "Border Radius Large (px)"
            name: "radiusLg"
            widget: "number"
            value_type: "int"
            min: 0
            max: 48
            step: 1
            default: 12
            hint: "Rounding for large elements — video player container, featured content cards, and modal dialogs. Default: 12px"

          # ── Browser Theme ──
          - label: "Browser Theme Color"
            name: "themeColor"
            widget: "color"
            default: "#6B3A1F"
            hint: "The color shown in the browser's address bar and tab on mobile devices. Usually matches the primary color. Default: #6B3A1F"

  # ─────────────────────────────────────────────
  # Topics (admin-only — rarely edited)
  # ─────────────────────────────────────────────
  - name: "topics"
    label: "Topics"
    label_singular: "Topic"
    description: "Manage the main topic categories (e.g., Agriculture, Education). Most users won't need to edit this."
    folder: "src/content/topics"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Topic Name"
        name: "title"
        widget: "string"
        hint: "e.g., Agriculture, Education, Healthcare"
      - label: "URL Slug"
        name: "slug"
        widget: "string"
        pattern: ['^[a-z0-9-]+$', "Use only lowercase letters, numbers, and hyphens"]
        hint: "This becomes part of the web address. Use lowercase, no spaces."
      - label: "Description"
        name: "description"
        widget: "text"
        hint: "A short summary of what this topic covers (1–2 sentences)."
      - label: "Icon"
        name: "icon"
        widget: "string"
        required: false
        hint: "Icon name (e.g., book-open, sprout). Ask the developer if unsure."
      - label: "Display Order"
        name: "order"
        widget: "number"
        value_type: "int"
        min: 1
        default: 1
        hint: "Lower numbers appear first on the homepage."
      - label: "Guided Syllabus"
        name: "guidedSyllabus"
        widget: "markdown"
        default: ""
        required: false
        editor_components: []
        hint: "Your curated reading list for this topic — use the formatting toolbar above to add bold text, links, bullet lists, and more. 📌 Quick tip on headings: When you want to break your syllabus into sections (like 'Books', 'Papers', 'Reports'), pick 'Heading 2' from the toolbar. Need a sub-section inside one of those? Use 'Heading 3' or smaller. Please don't use 'Heading 1' — the page already has its own main title, and using another one would look odd on the website. If no syllabus is ready yet, just leave this empty."

  # ─────────────────────────────────────────────
  # FAQs
  # ─────────────────────────────────────────────
  - name: "faqs"
    label: "FAQs"
    label_singular: "FAQ"
    description: "Frequently asked questions — each FAQ belongs to a topic and has a question + detailed answer."
    folder: "src/content/faqs"
    format: "frontmatter"
    extension: "mdx"
    create: true
    slug: "{{slug}}"
    path: "{{topic}}/{{slug}}"
    fields:
      - label: "Topic"
        name: "topic"
        widget: "relation"
        collection: "topics"
        search_fields: ["title"]
        value_field: "slug"
        display_fields: ["title"]
        hint: "Which topic does this FAQ belong to?"
      - label: "Question"
        name: "question"
        widget: "string"
        hint: "Type the full question exactly as it should appear on the site."
      - label: "Display Order"
        name: "order"
        widget: "number"
        value_type: "int"
        min: 1
        default: 1
        hint: "Controls the order FAQs appear in. Lower numbers show first."
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "Turn this on to hide this FAQ from the public site while you work on it."
      - label: "Answer"
        name: "body"
        widget: "markdown"
        hint: "Write the full answer here — the toolbar above lets you format text with bold, links, bullet lists, images, and more. 📌 Quick tip on headings: Most answers won't need headings at all, and that's perfectly fine! But if your answer is long and has distinct sections, use 'Heading 2' from the toolbar for those section titles. If you need a sub-section inside one of those, use 'Heading 3' or smaller. Please don't use 'Heading 1' — the question itself already serves as the main heading on the page, and adding another one would create visual confusion."

  # ─────────────────────────────────────────────
  # Video Curriculum
  # ─────────────────────────────────────────────
  - name: "videos"
    label: "Videos"
    label_singular: "Video"
    description: "Video curriculum entries — each links to a YouTube video with notes."
    folder: "src/content/videos"
    format: "frontmatter"
    extension: "mdx"
    create: true
    slug: "{{slug}}"
    path: "{{topic}}/{{slug}}"
    fields:
      - label: "Topic"
        name: "topic"
        widget: "relation"
        collection: "topics"
        search_fields: ["title"]
        value_field: "slug"
        display_fields: ["title"]
        hint: "Which topic does this video belong to?"
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The title of the video as it should appear on the site."
      - label: "YouTube Video ID"
        name: "youtubeId"
        widget: "string"
        hint: "Open the video on YouTube. Copy just the code after 'v=' in the URL. For example, if the URL is youtube.com/watch?v=dQw4w9WgXcQ, enter: dQw4w9WgXcQ"
      - label: "Format"
        name: "format"
        widget: "select"
        options:
          - { label: "Video", value: "video" }
          - { label: "Short", value: "short" }
        default: "video"
        hint: "Choose 'Short' for YouTube Shorts (vertical, brief clips). Choose 'Video' for regular YouTube videos."
      - label: "Orientation"
        name: "orientation"
        widget: "select"
        options:
          - { label: "Horizontal", value: "horizontal" }
          - { label: "Vertical", value: "vertical" }
        default: "horizontal"
        hint: "Only applies to Videos. Select 'Vertical' if the video is in portrait/vertical format. Shorts are always vertical."
      - label: "Short Description"
        name: "description"
        widget: "text"
        hint: "A brief summary of what the video covers (1–3 sentences)."
      - label: "Duration"
        name: "duration"
        widget: "string"
        required: false
        hint: "How long is the video? e.g., 18:42 or 1:05:30"
      - label: "Speaker"
        name: "speaker"
        widget: "string"
        required: false
        hint: "Who is speaking in this video? e.g., Dr. Parth Shah"
      - label: "Display Order"
        name: "order"
        widget: "number"
        value_type: "int"
        min: 1
        default: 1
        hint: "Controls the order videos appear in. Lower numbers show first."
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "Turn this on to hide this video from the public site while you work on it."
      - label: "Extended Notes"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Optional: add timestamps, key takeaways, or extra context about the video. 📌 Quick tip on headings: If your notes have sections, use 'Heading 2' from the toolbar. For sub-sections, use 'Heading 3' or smaller. Please don't use 'Heading 1' — the video title already serves as the main heading on the page."
